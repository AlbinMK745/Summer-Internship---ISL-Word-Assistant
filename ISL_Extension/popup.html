<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 14px;
      min-width: 240px;
      background: #f8f9fa;
      color: #333;
    }

    h3 {
      font-size: 15px;
      margin-bottom: 14px;
      font-weight: 600;
      text-align: center;
      color: #444;
    }

    .toggle-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toggle-item {
      background: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
      border: 1px solid #e3e6ea;
    }

    .toggle-item span {
      font-size: 14px;
      font-weight: 500;
    }

    /* Switch styling */
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #28a745;
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }

    /* Hover effect */
    .toggle-item:hover {
      background: #f1f3f5;
    }
  </style>
</head>
<body>
  <h3>ISL Extension Controls</h3>

  <div class="toggle-group">
    <div class="toggle-item">
      <span>Highlight Words </span>
      <label class="switch">
        <input type="checkbox" id="highlightToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-item">
      <span>Video on Selection </span>
      <label class="switch">
        <input type="checkbox" id="videoToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
